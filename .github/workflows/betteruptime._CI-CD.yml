name: Continuous Deployment

on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  DOCKER_ORG: adityavn03
  MANIFEST_REPO: aaditya07-netizen/Argocd-Betteruptime
  MANIFEST_FILE: betteruptimeV1.yml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_SECRET }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Betteruptime images
        run: |
          set -e

          for service in web backend pusher worker
          do
            echo "Building $service image"

            rm -rf out
            pnpm exec turbo prune "$service" --docker

            docker build \
              -f "apps/$service/Dockerfile" \
              -t "$DOCKER_ORG/betterstack1-$service:${GITHUB_SHA}" \
              -t "$DOCKER_ORG/betterstack1-$service:latest" \
              .

            docker push "$DOCKER_ORG/betterstack1-$service:${GITHUB_SHA}"
            docker push "$DOCKER_ORG/betterstack1-$service:latest"
          done

      - name: Checkout ArgoCD manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ secrets.PAT }}
          path: argocd-repo
          fetch-depth: 0

      - name: Update Kubernetes image tags
        working-directory: argocd-repo
        run: |
          set -e

          sed -i -E "s|image: ${DOCKER_ORG}/betterstack1-web:.*|image: ${DOCKER_ORG}/betterstack1-web:${GITHUB_SHA}|g" "$MANIFEST_FILE"
          sed -i -E "s|image: ${DOCKER_ORG}/betterstack1-backend:.*|image: ${DOCKER_ORG}/betterstack1-backend:${GITHUB_SHA}|g" "$MANIFEST_FILE"
          sed -i -E "s|image: ${DOCKER_ORG}/betterstack1-pusher:.*|image: ${DOCKER_ORG}/betterstack1-pusher:${GITHUB_SHA}|g" "$MANIFEST_FILE"
          sed -i -E "s|image: ${DOCKER_ORG}/betterstack1-worker:.*|image: ${DOCKER_ORG}/betterstack1-worker:${GITHUB_SHA}|g" "$MANIFEST_FILE"

      - name: Commit and push manifest changes
        working-directory: argocd-repo
        run: |
          set -e

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add "$MANIFEST_FILE"

          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git commit -m "Update Betteruptime images to ${GITHUB_SHA}"
          git push origin main